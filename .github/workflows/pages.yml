name: Publicar demonstração

on:
  push:
    branches: [main]
    paths:
      - index.html
      - app.js
      - styles.css
      - src/**
      - data/sample-prospects.csv
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Executar testes
        run: npm test
      - name: Preparar arquivos públicos
        run: |
          mkdir -p _site/src _site/data
          cp index.html app.js styles.css _site/
          cp src/prioritizer.js src/csv.js _site/src/
          cp data/sample-prospects.csv _site/data/
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
      - name: Enviar arquivos da página
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Publicar página
        id: deployment
        uses: actions/deploy-pages@v4
